<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NUTS 3 Travel Distance Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 24px;
      background: #f5f7fb;
      color: #222;
    }

    .card {
      max-width: 1100px;
      margin: 0 auto;
      background: #fff;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 8px;
    }

    .intro {
      margin-top: 0;
      color: #555;
    }

    .section {
      margin-top: 24px;
      padding-top: 8px;
    }

    .section h2 {
      margin-bottom: 12px;
      font-size: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 16px 24px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-weight: 700;
    }

    select,
    button {
      padding: 12px;
      font-size: 16px;
      border: 1px solid #cfcfcf;
      border-radius: 8px;
      box-sizing: border-box;
      width: 100%;
    }

    select:disabled {
      background: #f1f1f1;
      color: #777;
    }

    button {
      margin-top: 24px;
      cursor: pointer;
      font-weight: 700;
    }

    .result {
      margin-top: 24px;
      padding: 18px;
      background: #eef5ff;
      border-radius: 10px;
      line-height: 1.7;
      display: none;
    }

    .error {
      background: #fff1f1;
      color: #8a1f1f;
    }

    .section-title {
      margin-top: 18px;
      margin-bottom: 8px;
      font-size: 18px;
      font-weight: 700;
    }

    .total {
      font-size: 24px;
      font-weight: 700;
    }

    .muted {
      color: #666;
      font-size: 14px;
    }

    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>NUTS 3 Travel Distance Calculator</h1>
    <p class="intro">
      Select origin and destination NUTS 3 regions. The calculator returns the travel distance
      and the associated travel amount for 1 participant.
    </p>

    <div class="section">
      <h2>Origin</h2>
      <div class="grid">
        <div class="field">
          <label for="originCountry">Country of origin</label>
          <select id="originCountry">
            <option value="">Loading countries...</option>
          </select>
        </div>

        <div class="field">
          <label for="originNuts2">NUTS 2 of origin</label>
          <select id="originNuts2" disabled>
            <option value="">Select country first</option>
          </select>
        </div>

        <div class="field">
          <label for="originNuts3">NUTS 3 of origin</label>
          <select id="originNuts3" disabled>
            <option value="">Select NUTS 2 first</option>
          </select>
        </div>
      </div>
    </div>

    <div class="section">
      <h2>Destination</h2>
      <div class="grid">
        <div class="field">
          <label for="destinationCountry">Country of destination</label>
          <select id="destinationCountry">
            <option value="">Loading countries...</option>
          </select>
        </div>

        <div class="field">
          <label for="destinationNuts2">NUTS 2 of destination</label>
          <select id="destinationNuts2" disabled>
            <option value="">Select country first</option>
          </select>
        </div>

        <div class="field">
          <label for="destinationNuts3">NUTS 3 of destination</label>
          <select id="destinationNuts3" disabled>
            <option value="">Select NUTS 2 first</option>
          </select>
        </div>
      </div>
    </div>

    <button id="calculateBtn">Calculate travel distance and amount</button>

    <div id="result" class="result"></div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
